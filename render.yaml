services:
  - type: web
    name: nobita-tiktok-bot
    env: node
    plan: free
    runtime: node-18
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    healthCheckInterval: 30
    numInstances: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
      - key: MAX_CONCURRENT_REQUESTS
        value: "3"
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
