name: Build & Deploy to Render

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check syntax
        run: node -c index.js
      
      - name: Lint configuration
        run: |
          if [ -f .env.example ]; then
            echo "✅ Configuration template found"
          fi
      
      - name: Run tests (if available)
        run: npm test --if-present
        continue-on-error: true
      
      - name: Check Docker image can be built
        run: |
          docker build -t nobita-bot:test .
        continue-on-error: true

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK not set. Skipping deployment."
            echo "To enable auto-deploy:"
            echo "1. Go to Render Dashboard → Settings"
            echo "2. Copy Deploy Hook URL"
            echo "3. Add as GitHub secret: RENDER_DEPLOY_HOOK"
          else
            curl "$RENDER_DEPLOY_HOOK"
            echo "✅ Deployment triggered"
          fi

  notify:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
          fi
